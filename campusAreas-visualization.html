<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>校园地块边界可视化</title>
  <style>
    :root {
      --bg: #f2efe5;
      --ink: #263029;
      --muted: #697169;
      --panel: #fffdf8;
      --line: #d8d0bf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      min-height: 100vh;
    }

    .stage {
      padding: 16px;
      overflow: auto;
    }

    .map {
      position: relative;
      width: min(100%, 1536px);
      margin: 0 auto;
      border: 1px solid var(--line);
      background: #e4dccb;
      line-height: 0;
      box-shadow: 0 8px 24px rgba(38, 48, 41, 0.14);
    }

    .map img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .area {
      fill-opacity: 0.28;
      stroke: #ffffff;
      stroke-width: 5;
      stroke-linejoin: round;
      paint-order: stroke fill;
    }

    .area-outline {
      fill: none;
      stroke-width: 2;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .label-halo {
      fill: none;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .label {
      fill: #18251d;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 100vh;
      padding: 18px;
      border-left: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .legend {
      display: grid;
      gap: 8px;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      background: #fff;
      font-size: 13px;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .points {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage">
      <div class="map">
        <img src="底图2.png" alt="校园底图">
        <svg id="overlay" viewBox="0 0 1536 1024" role="img" aria-label="优化后的校园地块边界"></svg>
      </div>
    </section>

    <aside class="sidebar">
      <h1>地块边界可视化</h1>
      <p class="meta">坐标体系：1536 × 1024<br>白色粗线用于突出相邻区域的合并边界。</p>
      <div class="legend" id="legend"></div>
    </aside>
  </main>

  <script>
    const areas = [
      {
        name: "南园宿舍区",
        color: "#2f8f63",
        polygon: [[957,699],[1218,700],[1246,1002],[968,1000],[968,878],[1096,878],[1096,747],[963,747]]
      },
      {
        name: "教超-驿站-食堂",
        color: "#d4862d",
        polygon: [[963,747],[1096,747],[1096,878],[968,878]]
      },
      {
        name: "北园教学区",
        color: "#3478b8",
        polygon: [[708,422],[873,414],[987,407],[997,468],[1049,467],[1045,434],[1166,422],[1218,700],[957,699],[697,700]]
      },
      {
        name: "北大楼周边",
        color: "#9b5cad",
        polygon: [[867,272],[945,262],[1126,247],[1166,422],[1045,434],[1049,467],[997,468],[987,407],[873,414]]
      },
      {
        name: "操场-体育馆",
        color: "#c84f4a",
        polygon: [[723,216],[936,191],[945,262],[867,272],[873,414],[708,422]]
      },
      {
        name: "逸夫馆-费楼",
        color: "#75933e",
        polygon: [[619,98],[825,105],[828,202],[723,216],[708,422],[610,426],[612,351],[595,214]]
      }
    ];

    const overlay = document.getElementById("overlay");
    const legend = document.getElementById("legend");

    function pointsToString(points) {
      return points.map(([x, y]) => `${x},${y}`).join(" ");
    }

    function centroid(points) {
      let twiceArea = 0;
      let cx = 0;
      let cy = 0;

      for (let index = 0; index < points.length; index += 1) {
        const [x1, y1] = points[index];
        const [x2, y2] = points[(index + 1) % points.length];
        const factor = x1 * y2 - x2 * y1;
        twiceArea += factor;
        cx += (x1 + x2) * factor;
        cy += (y1 + y2) * factor;
      }

      if (Math.abs(twiceArea) < 1) {
        const sum = points.reduce((acc, [x, y]) => ({ x: acc.x + x, y: acc.y + y }), { x: 0, y: 0 });
        return [sum.x / points.length, sum.y / points.length];
      }

      return [cx / (3 * twiceArea), cy / (3 * twiceArea)];
    }

    areas.forEach((area) => {
      const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      polygon.setAttribute("class", "area");
      polygon.setAttribute("points", pointsToString(area.polygon));
      polygon.setAttribute("fill", area.color);
      overlay.appendChild(polygon);

      const outline = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      outline.setAttribute("class", "area-outline");
      outline.setAttribute("points", pointsToString(area.polygon));
      outline.setAttribute("stroke", area.color);
      overlay.appendChild(outline);

      const [x, y] = centroid(area.polygon);
      const halo = document.createElementNS("http://www.w3.org/2000/svg", "text");
      halo.setAttribute("class", "label label-halo");
      halo.setAttribute("x", x);
      halo.setAttribute("y", y);
      halo.textContent = area.name;
      overlay.appendChild(halo);

      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      label.setAttribute("class", "label");
      label.setAttribute("x", x);
      label.setAttribute("y", y);
      label.textContent = area.name;
      overlay.appendChild(label);

      const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `
        <span class="swatch" style="background:${area.color}"></span>
        <span class="name">${area.name}</span>
        <span class="points">${area.polygon.length} 点</span>
      `;
      legend.appendChild(item);
    });
  </script>
</body>
</html>
